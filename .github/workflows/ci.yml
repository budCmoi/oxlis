name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build API
        run: npm run build:api

      - name: Build web
        run: npm run build:web

  integration:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oxlis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oxlis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oxlis
      JWT_SECRET: change-me-now
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      API_URL: http://127.0.0.1:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy --schema prisma/schema.prisma
        working-directory: apps/api

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix apps/api

      - name: Seed database
        run: npm run prisma:seed --prefix apps/api

      - name: Build API
        run: npm run build --prefix apps/api

      - name: Start API
        run: npm run start --prefix apps/api > api.log 2>&1 &

      - name: Wait for API health
        run: |
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:4000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat api.log
          exit 1

      - name: Run smoke test
        run: npm run smoke:db

      - name: Run error-case tests
        run: npm run test:errors

      - name: Print API logs on failure
        if: failure()
        run: cat api.log

  e2e:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oxlis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oxlis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oxlis
      JWT_SECRET: change-me-now
      PORT: 4100
      CLIENT_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4100/api
      API_URL: http://127.0.0.1:4100/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy --schema prisma/schema.prisma
        working-directory: apps/api

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix apps/api

      - name: Seed database
        run: npm run prisma:seed --prefix apps/api

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore